{% extends "base.html" %}
{% load static %}

{% block content %}
    <div class="container">
        {% if request.user.is_superuser %}
            <div class="card">
                <h1>Welcome to the Home Page</h1>
            </div>
        {% else %}
            <div class="card">
                <h2>Access Denied</h2>
                <p>You do not have permission to view this page.</p>
            </div>
        {% endif %}
    </div>
{% endblock %}
