{% extends "base.html" %}
{% block content %}
<div class="container">
    <h1>Edit {{ player.name }}</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Save</button>
    </form>
    <a href="{% url 'player_detail' player.pk %}">Back to details</a>
</div>
{% endblock %}
