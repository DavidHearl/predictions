{% extends "base.html" %}
{% block content %}
{% if request.user.is_superuser %}
<div class="container">
    <h1>Edit {{ player.name }}</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Save</button>
    </form>
    <a href="{% url 'player_detail' player.pk %}">Back to details</a>
</div>
{% else %}
<div class="container">
    <h2>Access Denied</h2>
    <p>You do not have permission to view this page.</p>
</div>
{% endif %}
{% endblock %}
